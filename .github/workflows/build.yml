name: Build TagWolf EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "TagWolf" --add-data "src/gui.py;." --add-data "src/api_client.py;." --hidden-import requests src/main.py
    
    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v3
      with:
        name: TagWolf-Installer
        path: dist/TagWolf.exe
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: TagWolf v1.0.${{ github.run_number }}
        files: dist/TagWolf.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
