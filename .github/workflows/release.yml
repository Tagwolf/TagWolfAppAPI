name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (z.B. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "TagWolf" --add-data "src/gui.py;." --add-data "src/api_client.py;." --hidden-import requests src/main.py
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version || github.ref_name }}
        name: TagWolf ${{ github.event.inputs.version || github.ref_name }}
        body: |
          ## 🎉 TagWolf Release
          
          ### Features
          - Lila-blauer Farbverlauf
          - Animationen mit schwebenden Partikeln
          - API-Integration
          - Pulsierender Glow-Effekt
          
          ### Installation
          1. `TagWolf.exe` herunterladen
          2. Doppelklick zum Starten
          3. Keine Installation nötig!
          
          ### Systemanforderungen
          - Windows 7/8/10/11
          - Keine Admin-Rechte nötig
        files: dist/TagWolf.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
